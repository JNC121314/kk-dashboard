name: 每日更新数据看板

on:
  workflow_dispatch: # 由 Cloudflare Worker Cron 精准触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 提取最新数据
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          TZ: Asia/Shanghai
        run: python fetch_data.py

      - name: 生成HTML报告
        env:
          TZ: Asia/Shanghai
        run: python generate_report.py

      - name: 准备部署文件
        run: |
          mkdir -p publish
          cp 开开华彩数据看板.html publish/index.html

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kk-dashboard
          directory: publish
          branch: main

      - name: 同步到 GitHub Pages（备用）
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          force_orphan: true

      - name: 微信推送通知
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python -c "
          import json, os, urllib.request
          tokens = os.environ['PUSHPLUS_TOKEN'].split(',')
          status = os.environ['JOB_STATUS']
          if status == 'success':
              with open('push_content.txt', 'r', encoding='utf-8') as f:
                  content = f.read()
              title = '📊 开开华彩数据看板已更新'
          else:
              content = '数据看板更新失败，请检查。<br><br>GitHub Actions：<a href=https://github.com/JNC121314/kk-dashboard/actions>查看运行日志</a>'
              title = '⚠️ 开开华彩数据看板更新失败'
          for token in tokens:
              token = token.strip()
              if not token:
                  continue
              data = json.dumps({'token': token, 'title': title, 'content': content, 'template': 'html'}).encode('utf-8')
              req = urllib.request.Request('https://www.pushplus.plus/send', data=data, headers={'Content-Type': 'application/json'})
              resp = urllib.request.urlopen(req)
              print(resp.read().decode('utf-8'))
          "
