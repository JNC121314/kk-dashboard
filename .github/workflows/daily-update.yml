name: 每日更新数据看板

on:
  schedule:
    # UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 提取最新数据
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python fetch_data.py

      - name: 生成HTML报告
        run: python generate_report.py

      - name: 准备部署文件
        run: |
          mkdir -p publish
          cp 开开华彩数据看板.html publish/index.html

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          force_orphan: true

      - name: 同步到 Gitee Pages
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd publish
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "auto update $(date -u '+%Y-%m-%d %H:%M')"
          git push "https://JNc1213:${GITEE_TOKEN}@gitee.com/JNc1213/kk-dashboard.git" HEAD:gh-pages --force

      - name: 触发 Gitee Pages 更新
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -H "Authorization: token ${GITEE_TOKEN}" \
            "https://gitee.com/api/v5/repos/JNc1213/kk-dashboard/pages/builds" || true
