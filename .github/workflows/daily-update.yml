name: 每日更新数据看板

on:
  schedule:
    # 北京时间 0/9/11/15/19/22 点自动更新（UTC -8h）
    - cron: '0 1,3,7,11,14,16 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 提取最新数据
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python fetch_data.py

      - name: 生成HTML报告
        run: python generate_report.py

      - name: 准备部署文件
        run: |
          mkdir -p publish
          cp 开开华彩数据看板.html publish/index.html

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kk-dashboard
          directory: publish
          branch: main

      - name: 同步到 GitHub Pages（备用）
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          force_orphan: true

      - name: 微信推送通知
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          UPDATE_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="📊 开开华彩数据看板已更新"
            CONTENT="数据看板已于 ${UPDATE_TIME} 更新完成。<br><br>查看链接：<a href='https://kk-dashboard-85x.pages.dev/'>https://kk-dashboard-85x.pages.dev/</a>"
          else
            TITLE="⚠️ 开开华彩数据看板更新失败"
            CONTENT="数据看板更新于 ${UPDATE_TIME} 失败，请检查。<br><br>GitHub Actions：<a href='https://github.com/JNC121314/kk-dashboard/actions'>查看运行日志</a>"
          fi
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${PUSHPLUS_TOKEN}\",\"title\":\"${TITLE}\",\"content\":\"${CONTENT}\",\"template\":\"html\"}"
